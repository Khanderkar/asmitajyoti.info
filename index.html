.join-btn{

}

.join-btn.disabled{

.ads-section{

.ad-card{

}

.ad-card img{

}

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.85);
    z-index:2000;
    justify-content:center;
    align-items:center;
}

.modal img{

    max-height:95%;
}

.modal-close{
    position:absolute;
    top:20px;
    right:30px;
    font-size:36px;
    color:#fff;
    cursor:pointer;
}

footer{
    margin-top:40px;
    font-size:.85rem;
}

@media(max-width:768px){

<!-- 
  The functional submission form. 
  target="_blank" forces mobiles & desktops to launch the results in a new tab upon submit.
-->
<form
    id="attendanceForm"
    method="POST"
    action="https://script.google.com/macros/s/AKfycbwBYb6d-_0F0nPWOwp5141TSCXVpfe0jr6OJq1VGw1txkevsBSsSOXOeWe5DpjaiTz8/exec"
    target="_blank"
    style="display:none;">
    <input type="hidden" name="fullName" id="formFullName">
    <input type="hidden" name="membershipId" id="formMembershipId">
    <input type="hidden" name="building" id="formBuilding">
    <input type="hidden" name="flatNo" id="formFlatNo">
</form>

    <script src="https://cdn.counter.dev/script.js" data-id="6461317c-4e57-4b01-a820-e81a891f2dd6"></script>

<script>
/* Zoom URL configuration link */
const meetingUrl = "https://ov-live-in.zoom.us/j/81949507804?pwd=OPhD5lM9MjVEJfweaWNkpNTmmOghX9.1";

const authorized = document.getElementById("authorized");
const fullName = document.getElementById("fullName");
const membershipId = document.getElementById("membershipId");
const building = document.getElementById("building");
const flatNo = document.getElementById("flatNo");
const joinBtn = document.getElementById("joinBtn");

/* Enable form fields functionality */
authorized.addEventListener("change", function(){
    document.getElementById("joinForm").style.display = this.checked ? "flex" : "none";
    validateForm();
});

/* Enforce numeric characters rules exclusively for Membership Input */
membershipId.addEventListener("input", function(){
    this.value = this.value.replace(/[^0-9]/g, "");
});

/* Master Client-Side Form Validation Check */
function validateForm(){
    if(
        authorized.checked &&
        fullName.value.trim() !== "" &&
        building.value !== "" &&
        flatNo.value !== ""
    ){
        joinBtn.classList.remove("disabled");
    }
    else{
        joinBtn.classList.add("disabled");
    }
}

fullName.addEventListener("input", validateForm);
building.addEventListener("change", validateForm);
flatNo.addEventListener("change", validateForm);

/* Handle Join Button Interaction Action Trigger */
joinBtn.addEventListener("click", function(e){
    e.preventDefault();

    if(
        !authorized.checked ||
        fullName.value.trim() === "" ||
        building.value === "" ||
        flatNo.value === ""
    ){
        alert("Please tick and fill all the required information for joining the meeting.");
        return;
    }

    // Populate data payload accurately to the template form structures
    document.getElementById("formFullName").value = fullName.value.trim();
    document.getElementById("formMembershipId").value = membershipId.value.trim();
    document.getElementById("formBuilding").value = building.value;
    document.getElementById("formFlatNo").value = flatNo.value;

    // Fire form submission directly out to a new window target 
    document.getElementById("attendanceForm").submit();

    // Re-engage standard interactive properties on primary base screen safely
    setTimeout(function() {
        joinBtn.innerText = "Join Meeting";
        joinBtn.classList.remove("disabled");
    }, 1000);
});   

/* Image Modal System Popups logic */
function openModal(card){
    document.getElementById("modalImg").src = card.querySelector("img").src;
    document.getElementById("imgModal").style.display = "flex";
}

function closeModal(){
    document.getElementById("imgModal").style.display = "none";
}

/* Event Real-time Countdown Tracking Module Engine */
const meetingDate = new Date("2026-06-14T11:30:00").getTime();

setInterval(() => {
    const d = meetingDate - new Date().getTime();

    if(d <= 0){
        document.getElementById("countdown").innerHTML = "<span>Meeting Started</span>";
        return;
    }

    document.getElementById("countdown").innerHTML =
        `<span>${Math.floor(d/86400000)} Days</span>
         <span>${Math.floor(d/3600000)%24} Hrs</span>
         <span>${Math.floor(d/60000)%60} Min</span>
         <span>${Math.floor(d/1000)%60} Sec</span>`;
}, 1000);
</script>
