<title>Asmita Jyoti – Redevelopment</title>

<style>
* { box-sizing: border-box; }

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    color:#fff;
    min-height:100vh;
    padding-top:40px; /* Reduced padding from 280px since the fixed banner is hidden */
    text-align:center;
}

.top-banner{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:#ffcc00;
    color:#000;
    z-index:1000;
    box-shadow:0 2px 6px rgba(0,0,0,.25);
}

.banner-content{
    max-width:1200px;
    margin:auto;
    padding:14px 16px 20px;
}

.banner-title{
    font-weight:bold;
    font-size:1rem;
}

.marathi{
    margin-top:6px;
    font-size:.95rem;
}

.countdown span{
    background:#fff;
    padding:6px 10px;
    margin:2px;
    border-radius:4px;
    display:inline-block;
    min-width:70px;
}

.auth-box{
    margin-top:15px;
    font-weight:bold;
}

.auth-box input{
    transform:scale(1.2);
    margin-right:8px;
    cursor:pointer;
}

.join-container {
    margin-top: 15px;
}

.join-btn{
    display:inline-block;
    padding:12px 26px;
    background:#003366;
    color:#fff;
    text-decoration:none;
    border-radius:6px;
    font-weight:bold;
    border:none;
    cursor:pointer;
}

.join-btn.disabled{
    background:#999;
    opacity:.6;
    cursor:not-allowed;
}

.zoom-info-box {
    display: none;
    background: #ffffff;
    color: #333333;
    max-width: 650px;
    margin: 15px auto 0 auto;
    padding: 12px 16px;
    border-radius: 6px;
    font-size: 14px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    line-height: 1.5;
    border-left: 5px solid #003366;
}

.zoom-info-box a {
    color: #003366;
    text-decoration: underline;
    font-weight: bold;
}

.ads-section{
    max-width:1200px;
    margin:auto;
    padding:40px 20px;
}

/* Custom styling for the PDF link to stand out and look clickable */
.pdf-link {
    color: #ffcc00;
    text-decoration: none;
}
.pdf-link:hover {
    text-decoration: underline;
}

.ad-card{
    background:#fff;
    color:#000;
    border-radius:8px;
    padding:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
    cursor:pointer;
}

.ad-card img{
    width:100%;
    border-radius:4px;
}

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.85);
    z-index:2000;
    justify-content:center;
    align-items:center;
}

.modal img{
    max-width:95%;
    max-height:95%;
}

.modal-close{
    position:absolute;
    top:20px;
    right:30px;
    font-size:36px;
    color:#fff;
    cursor:pointer;
}

footer{
    margin-top:40px;
    font-size:.85rem;
}

@media(max-width:768px){
    body{
        padding-top:40px; /* Reduced mobile padding context as well */
    }
    
    .zoom-info-box {
        max-width: 90%;
        font-size: 13px;
    }
}
</style>
</head>

<body>

<div class="ads-section">
    <!-- Minutes of Meeting PDF Section -->
    <h1>
        <a href="https://www.asmitajyoti.info/PDF/SGBM_MINUTES_14_02_2026.pdf" target="_blank" class="pdf-link">
            21 Jun 2026 | SGBM Minutes Of Meeting (PDF)
        </a>
    </h1>
    
    <hr style="border: 0; border-top: 1px dashed rgba(255,255,255,0.3); margin: 40px 0;">

    <!-- Existing Notice Section -->
    <h1>28 May 2026 | SGBM Notice - Redevelopment / PMC Recruitment</h1>
    <div class="ad-card" onclick="openModal(this)">
        <img src="Images/AGM_Notice.jpg" alt="Notice">
    </div>
</div>

<div class="modal" id="imgModal">
    <span class="modal-close" onclick="closeModal()">×</span>
    <img id="modalImg">
</div>

<footer>
    Visitor Count:
    <script src="https://cdn.counter.dev/script.js" data-id="6461317c-4e57-4b01-a820-e81a891f2dd6"></script>
</footer>

<script>
const authorized = document.getElementById("authorized");
const joinBtn = document.getElementById("joinBtn");
const zoomInfoBox = document.getElementById("zoomInfoBox");

/* Handle checkbox state to toggle button styling and details block visibility */
if (authorized) {
    authorized.addEventListener("change", function(){
        if(this.checked) {
            joinBtn.classList.remove("disabled");
            zoomInfoBox.style.display = "block";
        } else {
            joinBtn.classList.add("disabled");
            zoomInfoBox.style.display = "none";
        }
    });
}

/* Intercept button click interactions */
if (joinBtn) {
    joinBtn.addEventListener("click", function(e){
        // If the checkbox isn't checked, block redirection and show the alert
        if(!authorized.checked){
            e.preventDefault();
            alert("Please tick and fill all the required information for joining the meeting.");
        }
    });   
}

function openModal(card){
    document.getElementById("modalImg").src = card.querySelector("img").src;
    document.getElementById("imgModal").style.display = "flex";
}

function closeModal(){
    document.getElementById("imgModal").style.display = "none";
}

const meetingDate = new Date("2026-06-14T11:30:00").getTime();

setInterval(() => {
    const d = meetingDate - new Date().getTime();
    const countdownEl = document.getElementById("countdown");
    
    if(!countdownEl) return;

    if(d <= 0){
        countdownEl.innerHTML = "<span>Meeting Started</span>";
        return;
    }

    countdownEl.innerHTML =
        `<span>${Math.floor(d/86400000)} Days</span>
         <span>${Math.floor(d/3600000)%24} Hrs</span>
         <span>${Math.floor(d/60000)%60} Min</span>
         <span>${Math.floor(d/1000)%60} Sec</span>`;
}, 1000);
</script>
