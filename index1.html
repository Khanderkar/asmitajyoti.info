<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asmita Jyoti – Redevelopment</title>

<style>
* { box-sizing: border-box; }

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    color:#fff;
    min-height:100vh;
    padding-top:420px;
    text-align:center;
}

.top-banner{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:#ffcc00;
    color:#000;
    z-index:1000;
    box-shadow:0 2px 6px rgba(0,0,0,.25);
}

.banner-content{
    max-width:1200px;
    margin:auto;
    padding:14px 16px 20px;
}

.banner-title{
    font-weight:bold;
    font-size:1rem;
}

.marathi{
    margin-top:6px;
    font-size:.95rem;
}

.countdown span{
    background:#fff;
    padding:6px 10px;
    margin:2px;
    border-radius:4px;
    display:inline-block;
    min-width:70px;
}

.auth-box{
    margin-top:15px;
    font-weight:bold;
}

.auth-box input{
    transform:scale(1.2);
    margin-right:8px;
}

.join-form{
    margin-top:15px;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
}

.join-form input,
.join-form select{
    padding:10px;
    border-radius:5px;
    border:1px solid #999;
    min-width:200px;
    font-size:14px;
}

.join-btn{
    display:inline-block;
    margin-top:15px;
    padding:12px 26px;
    background:#003366;
    color:#fff;
    text-decoration:none;
    border-radius:6px;
    font-weight:bold;
}

.join-btn.disabled{
    background:#999;
    opacity:.6;
    cursor:pointer;
}

.ads-section{
    max-width:1200px;
    margin:auto;
    padding:40px 20px;
}

.ad-card{
    background:#fff;
    color:#000;
    border-radius:8px;
    padding:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
    cursor:pointer;
}

.ad-card img{
    width:100%;
    border-radius:4px;
}

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.85);
    z-index:2000;
    justify-content:center;
    align-items:center;
}

.modal img{
    max-width:95%;
    max-height:95%;
}

.modal-close{
    position:absolute;
    top:20px;
    right:30px;
    font-size:36px;
    color:#fff;
    cursor:pointer;
}

footer{
    margin-top:40px;
    font-size:.85rem;
}

@media(max-width:768px){

    body{
        padding-top:650px;
    }

    .join-form{
        flex-direction:column;
        align-items:center;
    }
}
</style>
</head>

<body>

<div class="top-banner">

    <div class="banner-content">

        <div class="banner-title">
            Online Zoom Meet – Special General Body Meeting<br>
            14 June 2026, 11:30 AM | Asmita Jyoti Redevelopment
        </div>

        <div class="marathi">
            ऑनलाईन Zoom Meet – विशेष सर्वसाधारण सभा<br>
            १४ जून २०२६ सकाळी ११:३० वाजता
        </div>

        <div id="countdown" class="countdown">
            Loading...
        </div>

        <div class="auth-box">
            <label>
                <input type="checkbox" id="authorized">
                I confirm that I am an authorized member entitled to attend this SGBM and the details provided below are correct.
            </label>
        </div>

        <div class="join-form">

            <input
                type="text"
                id="fullName"
                placeholder="Full Name *"
                disabled>

            <input
                type="text"
                id="membershipId"
                placeholder="Membership ID (Optional)"
                disabled>

            <select id="building" disabled>
                <option value="">Select Building *</option>
                <option>A01</option>
                <option>A02</option>
                <option>B01</option>
            </select>

            <select id="flatNo" disabled>
                <option value="">Select Flat Number *</option>
                <option>01</option>
                <option>02</option>
                <option>03</option>
                <option>04</option>
            </select>

        </div>

        <a href="#" id="joinBtn" class="join-btn disabled">
            Join Meeting
        </a>

    </div>

</div>

<div class="ads-section">

    <h1>
        28 May 2026 | SGBM Notice - Redevelopment / PMC Recruitment
    </h1>

    <div class="ad-card" onclick="openModal(this)">
        <img src="Images/AGM_Notice.jpg" alt="Notice">
    </div>

</div>

<div class="modal" id="imgModal">
    <span class="modal-close" onclick="closeModal()">×</span>
    <img id="modalImg">
</div>
<iframe
    name="attendanceFrame"
    id="attendanceFrame"
    style="display:none;">
</iframe>

<form
    id="attendanceForm"
    method="POST"
    action="https://script.google.com/macros/s/AKfycbwBYb6d-_0F0nPWOwp5141TSCXVpfe0jr6OJq1VGw1txkevsBSsSOXOeWe5DpjaiTz8/exec"
    target="attendanceFrame"
    style="display:none;">

    <input type="hidden" name="fullName" id="formFullName">
    <input type="hidden" name="membershipId" id="formMembershipId">
    <input type="hidden" name="building" id="formBuilding">
    <input type="hidden" name="flatNo" id="formFlatNo">

</form>
<footer>
    Visitor Count:
    <script src="https://cdn.counter.dev/script.js"
        data-id="6461317c-4e57-4b01-a820-e81a891f2dd6">
    </script>
</footer>

<script>

/* Zoom URL */
const meetingUrl =
"https://ov-live-in.zoom.us/j/81949507804?pwd=OPhD5lM9MjVEJfweaWNkpNTmmOghX9.1";



const authorized = document.getElementById("authorized");
const fullName = document.getElementById("fullName");
const membershipId = document.getElementById("membershipId");
const building = document.getElementById("building");
const flatNo = document.getElementById("flatNo");
const joinBtn = document.getElementById("joinBtn");

/* Enable form */
authorized.addEventListener("change", function(){

    const enabled = this.checked;

    fullName.disabled = !enabled;
    membershipId.disabled = !enabled;
    building.disabled = !enabled;
    flatNo.disabled = !enabled;

    validateForm();
});

/* Numbers only */
membershipId.addEventListener("input", function(){
    this.value = this.value.replace(/[^0-9]/g, "");
});

/* Validation */
function validateForm(){

    if(
        authorized.checked &&
        fullName.value.trim() !== "" &&
        building.value !== "" &&
        flatNo.value !== ""
    ){
        joinBtn.classList.remove("disabled");
    }
    else{
        joinBtn.classList.add("disabled");
    }
}

fullName.addEventListener("input", validateForm);
building.addEventListener("change", validateForm);
flatNo.addEventListener("change", validateForm);

/* Join Meeting */
joinBtn.addEventListener("click", function(e){

    e.preventDefault();

    if(
        !authorized.checked ||
        fullName.value.trim() === "" ||
        building.value === "" ||
        flatNo.value === ""
    ){
        alert(
            "Please tick and fill all the required information for joining the meeting."
        );
        return;
    }

    document.getElementById("formFullName").value =
        fullName.value.trim();

    document.getElementById("formMembershipId").value =
        membershipId.value.trim();

    document.getElementById("formBuilding").value =
        building.value;

    document.getElementById("formFlatNo").value =
        flatNo.value;

    document.getElementById("attendanceForm").submit();

    window.open(
        meetingUrl,
        "_blank"
    );

});

/* Image Popup */
function openModal(card){
    document.getElementById("modalImg").src =
        card.querySelector("img").src;

    document.getElementById("imgModal").style.display = "flex";
}

function closeModal(){
    document.getElementById("imgModal").style.display = "none";
}

/* Countdown */
const meetingDate =
    new Date("2026-06-14T11:30:00").getTime();

setInterval(() => {

    const d = meetingDate - new Date().getTime();

    if(d <= 0){
        document.getElementById("countdown").innerHTML =
            "<span>Meeting Started</span>";
        return;
    }

    document.getElementById("countdown").innerHTML =
        `<span>${Math.floor(d/86400000)} Days</span>
         <span>${Math.floor(d/3600000)%24} Hrs</span>
         <span>${Math.floor(d/60000)%60} Min</span>
         <span>${Math.floor(d/1000)%60} Sec</span>`;

}, 1000);

</script>

</body>
</html>
