<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asmita Jyoti – Redevelopment</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* Main Layout Wrapper */
.main-wrapper {
    display: flex;
    flex: 1;
    height: 100vh;
    overflow: hidden;
    position: relative;
}

/* --- LEFT SIDEBAR --- */
.sidebar {
    width: 320px;
    background: rgba(0, 0, 0, 0.25);
    border-right: 1px solid rgba(255, 255, 255, 0.1);
    display: flex;
    flex-direction: column;
    transition: width 0.3s ease;
    z-index: 10;
    flex-shrink: 0;
}

.sidebar.collapsed {
    width: 0;
    border-right: none;
}

/* Hide content when sidebar is shrinking to avoid layout pop */
.sidebar-content {
    width: 320px;
    display: flex;
    flex-direction: column;
    height: 100%;
    transition: opacity 0.2s ease;
}

.sidebar.collapsed .sidebar-content {
    opacity: 0;
    pointer-events: none;
}

.sidebar-header {
    padding: 15px;
    background: rgba(0, 0, 0, 0.3);
    font-weight: bold;
    font-size: 1.1rem;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.sidebar-menu {
    list-style: none;
    padding: 0;
    margin: 0;
    overflow-y: auto;
}

.sidebar-item {
    padding: 15px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    cursor: pointer;
    text-align: left;
    transition: background 0.2s ease;
    font-size: 0.95rem;
    line-height: 1.4;
}

.sidebar-item:hover, .sidebar-item.active {
    background: rgba(255, 255, 255, 0.15);
}

.sidebar-item.active {
    border-left: 4px solid #ffcc00;
}

/* --- STREAMLINED TOGGLE BUTTON (<< / >>) --- */
.toggle-btn {
    position: absolute;
    top: 15px;
    left: 335px;
    background: #ffcc00;
    color: #000;
    border: none;
    padding: 8px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
    font-size: 1.1rem;
    z-index: 100;
    transition: left 0.3s ease;
    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
}

.sidebar.collapsed + .toggle-btn {
    left: 15px;
}

/* --- RIGHT SIDE CONTENT AREA --- */
.content-area {
    flex: 1;
    padding: 70px 30px 30px 30px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.doc-content {
    display: none;
    width: 100%;
    height: 100%;
    max-width: 1000px;
    animation: fadeIn 0.4s ease;
}

.doc-content.active {
    display: flex;
    flex-direction: column;
}

.doc-title {
    font-size: 1.5rem;
    margin: 0 0 15px 0;
    text-align: center;
}

/* Full PDF Frame Styling */
.pdf-viewer-frame {
    width: 100%;
    flex: 1;
    border: none;
    border-radius: 6px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    background: #fff;
    min-height: 500px;
}

/* Notice Card Layout */
.ad-card {
    background: #fff;
    color: #000;
    border-radius: 8px;
    padding: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,.25);
    cursor: pointer;
    display: block;
    margin: 0 auto;
    max-width: 600px;
}

.ad-card img {
    width: 100%;
    border-radius: 4px;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Modal views */
.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.85);
    z-index: 2000;
    justify-content: center;
    align-items: center;
}

.modal img {
    max-width: 95%;
    max-height: 95%;
}

.modal-close {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 36px;
    color: #fff;
    cursor: pointer;
}

footer {
    padding: 15px;
    font-size: .85rem;
    background: rgba(0,0,0,0.2);
    text-align: center;
}

/* Mobile Adjustments */
@media(max-width: 768px) {
    .main-wrapper {
        flex-direction: column;
    }
    .sidebar {
        width: 100%;
        height: auto;
    }
    .sidebar.collapsed {
        height: 0;
    }
    .sidebar-content {
        width: 100%;
    }
    .toggle-btn {
        position: relative;
        top: 0;
        left: 0 !important;
        margin: 10px;
        align-self: flex-start;
    }
    .content-area {
        padding: 15px;
    }
}
</style>
</head>

<body>

<div class="main-wrapper">

    <!-- LEFT SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-content">
            <div class="sidebar-header">Documents Menu</div>
            <ul class="sidebar-menu">
                <li class="sidebar-item active" onclick="switchDoc(0)">21 Jun 2026 | SGBM Minutes (PDF)</li>
                <li class="sidebar-item" onclick="switchDoc(1)">28 May 2026 | SGBM Notice</li>
            </ul>
        </div>
    </div>

    <!-- SIDEBAR TOGGLE BUTTON (<< / >>) -->
    <button class="toggle-btn" id="toggleBtn" onclick="toggleSidebar()">&lt;&lt;</button>

    <!-- RIGHT SIDE CONTENT CONTAINER -->
    <div class="content-area">
        
        <!-- Document 1: FULL EMBEDDED PDF -->
        <div class="doc-content active" id="doc-0">
            <h1 class="doc-title">21 Jun 2026 | SGBM Minutes Of Meeting</h1>
            <iframe class="pdf-viewer-frame" src="https://www.asmitajyoti.info/PDF/SGBM_MINUTES_14_02_2026.pdf"></iframe>
        </div>

        <!-- Document 2: Image Notice -->
        <div class="doc-content" id="doc-1">
            <h1 class="doc-title">28 May 2026 | SGBM Notice - Redevelopment / PMC Recruitment</h1>
            <div class="ad-card" onclick="openModal(this)">
                <img src="Images/AGM_Notice.jpg" alt="Notice">
            </div>
        </div>

    </div>
</div>

<!-- Modal View Component -->
<div class="modal" id="imgModal">
    <span class="modal-close" onclick="closeModal()">×</span>
    <img id="modalImg">
</div>

<footer>
    Visitor Count:
    <script src="https://cdn.counter.dev/script.js" data-id="6461317c-4e57-4b01-a820-e81a891f2dd6"></script>
</footer>

<script>
// Sidebar Toggle Logic with changing symbols
function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const toggleBtn = document.getElementById('toggleBtn');
    
    sidebar.classList.toggle('collapsed');
    
    if (sidebar.classList.contains('collapsed')) {
        toggleBtn.innerHTML = '&gt;&gt;';
    } else {
        toggleBtn.innerHTML = '&lt;&lt;';
    }
}

// Switch Right Panel Document Content
function switchDoc(index) {
    const contents = document.querySelectorAll('.doc-content');
    contents.forEach(doc => doc.classList.remove('active'));

    const menuItems = document.querySelectorAll('.sidebar-item');
    menuItems.forEach(item => item.classList.remove('active'));

    document.getElementById(`doc-${index}`).classList.add('active');
    menuItems[index].classList.add('active');
}

// Modal View Controls
function openModal(card){
    if(card.tagName === 'IFRAME') return;
    document.getElementById("modalImg").src = card.querySelector("img").src;
    document.getElementById("imgModal").style.display = "flex";
}

function closeModal(){
    document.getElementById("imgModal").style.display = "none";
}
</script>

</body>
</html>
